<div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
  <div class="flex items-center justify-between gap-4">
    <div>
      <div class="text-sm text-slate-400">{{ prediction.market|replace('_', ' ')|title }}</div>
      <div class="text-xl font-semibold">Projection {{ '%.2f'|format(prediction.projected_value) }}</div>
    </div>
    <div class="text-right">
      <div class="text-emerald-400 font-semibold">Edge {{ '%.1f'|format(prediction.edge_pct) }}%</div>
      <div class="text-slate-400 text-sm">Confidence {{ '%.0f'|format(prediction.confidence) }}</div>
    </div>
  </div>
  <p class="text-sm text-slate-300 mt-3">{{ prediction.rationale }}</p>
</div>

<!DOCTYPE html>
<html lang="en" class="h-full bg-[#07111f]">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ request.app.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            glow: '0 0 0 1px rgba(56,189,248,.15), 0 16px 40px rgba(2,132,199,.12)',
          },
          colors: {
            ink: '#07111f',
            panel: '#0d1728',
            panel2: '#111f34',
            line: 'rgba(148,163,184,.18)',
            accent: '#17c964',
            accent2: '#38bdf8',
            warning: '#f5a524'
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/css/site.css" />
</head>
<body class="min-h-full bg-[radial-gradient(circle_at_top,rgba(56,189,248,.12),transparent_24%),radial-gradient(circle_at_bottom,rgba(34,197,94,.08),transparent_28%),#07111f] text-slate-100">
  {% block content %}{% endblock %}
  <script src="/static/js/app.js"></script>
</body>
</html>

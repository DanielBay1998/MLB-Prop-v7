services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mlb_props
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build: .
    command: celery -A jobs.celery_app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
